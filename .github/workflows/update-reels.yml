name: Update Instagram Reels

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-reels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh reels data
        run: |
          python3 scripts/update_reels.py
          npm run build:site

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- src/data/reels.json media-links/reels.json index.html booking media-links reels _astro logo.png profile.png CNAME; then
            echo "No reels changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/reels.json media-links/reels.json index.html booking media-links reels _astro logo.png profile.png CNAME
          git commit -m "chore: update reels data"
          git push
