name: Update Instagram Reels

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-reels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh reels data
        run: python3 scripts/update_reels.py

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- media-links/reels.json index.html media-links/index.html; then
            echo "No reels changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media-links/reels.json index.html media-links/index.html
          git commit -m "chore: update reels data"
          git push
