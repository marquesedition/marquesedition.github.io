<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Marques Edition</title>
    <meta
      name="description"
      content="Bienvenido al sitio oficial de Marques Edition. Accede a todos los links desde una portada simple y mobile-first."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050214;
        --text: #f8f4ff;
        --muted: #c7bcdf;
        --pink: #ff5abf;
        --blue: #45d7ff;
        --line: rgba(168, 140, 255, 0.28);
        --panel: rgba(12, 8, 34, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 720px at 14% 18%, rgba(255, 90, 191, 0.34), transparent 52%),
          radial-gradient(980px 600px at 82% 28%, rgba(69, 215, 255, 0.32), transparent 58%),
          radial-gradient(1200px 760px at 50% 108%, rgba(123, 69, 255, 0.27), transparent 62%),
          linear-gradient(180deg, #120533 0%, #07031b 55%, #040210 100%);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(rgba(255, 255, 255, 0.18) 0.5px, transparent 0.5px);
        background-size: 3px 3px;
        opacity: 0.14;
      }

      .shell {
        width: min(100%, 430px);
      }

      .cover {
        position: relative;
        overflow: hidden;
        border-radius: 32px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(17, 11, 46, 0.12), rgba(17, 11, 46, 0.72)),
          var(--panel);
        box-shadow: 0 24px 62px rgba(2, 0, 12, 0.62);
        backdrop-filter: blur(18px) saturate(135%);
        -webkit-backdrop-filter: blur(18px) saturate(135%);
      }

      .cover-media {
        position: relative;
        min-height: 70svh;
        display: flex;
        align-items: flex-end;
        padding: 1.15rem;
        background:
          linear-gradient(180deg, rgba(8, 5, 22, 0.02) 0%, rgba(8, 5, 22, 0.16) 42%, rgba(8, 5, 22, 0.78) 100%),
          url("/profile.png") center 24% / cover no-repeat;
      }

      .cover-media::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(220px 180px at 16% 18%, rgba(255, 90, 191, 0.26), transparent 72%),
          radial-gradient(260px 220px at 82% 20%, rgba(69, 215, 255, 0.22), transparent 74%),
          linear-gradient(180deg, rgba(9, 6, 27, 0.12) 0%, rgba(9, 6, 27, 0.06) 32%, rgba(9, 6, 27, 0.74) 100%);
        pointer-events: none;
      }

      .cover-media::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 34%;
        background: linear-gradient(180deg, rgba(10, 6, 28, 0) 0%, rgba(10, 6, 28, 0.88) 100%);
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
        width: 100%;
        display: grid;
        gap: 0.9rem;
        text-align: center;
        padding: 0 0.15rem 0.25rem;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 8vw, 3rem);
        line-height: 0.96;
        font-weight: 800;
        text-shadow: 0 10px 28px rgba(0, 0, 0, 0.36);
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 60px;
        padding: 0.95rem 1.4rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 120, 201, 0.5);
        background:
          linear-gradient(135deg, rgba(255, 90, 191, 0.3), rgba(69, 215, 255, 0.22)),
          rgba(23, 16, 58, 0.9);
        color: var(--text);
        font-size: 1rem;
        font-weight: 800;
        text-decoration: none;
        box-shadow:
          0 16px 34px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
      }

      .cta:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 120, 201, 0.72);
        box-shadow:
          0 20px 38px rgba(0, 0, 0, 0.38),
          0 0 28px rgba(69, 215, 255, 0.14);
      }

      .cta:focus-visible {
        outline: 3px solid rgba(69, 215, 255, 0.55);
        outline-offset: 4px;
      }

      @media (min-width: 768px) {
        .cover-media {
          min-height: 680px;
          padding: 1.5rem;
          background-position: center 20%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cta {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="cover">
        <div class="cover-media">
          <div class="content">
            <p class="eyebrow">Marques Edition</p>
            <h1>Bienvenido</h1>
            <a class="cta" href="/media-links/">Ver links</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
